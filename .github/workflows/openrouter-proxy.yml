name: OpenRouter Proxy

on:
  repository_dispatch:
    types: [ai-request]
  workflow_dispatch:
    inputs:
      prompt:
        description: 'سوال شما'
        required: true
        default: 'Hello'

jobs:
  proxy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Call OpenRouter
        run: |
          PROMPT="${{ github.event.client_payload.prompt || github.event.inputs.prompt }}"
          
          RESPONSE=$(curl -s -X POST https://openrouter.ai/api/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.OPENROUTER_API_KEY }}" \
            -d '{
              "model": "openrouter/free",
              "messages": [{"role": "user", "content": "'"$PROMPT"'"}]
            }')
          
          echo "$RESPONSE" > result.json
          
          ANSWER=$(echo "$RESPONSE" | grep -o '"content":"[^"]*"' | head -1 | sed 's/"content":"//' | sed 's/"//')
          
          if [ -z "$ANSWER" ]; then
            ANSWER="خطا: پاسخی دریافت نشد"
          fi
          
          echo "$ANSWER" > latest-answer.txt
          
      - name: Save to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add latest-answer.txt result.json
          git commit -m "Update answer [skip ci]" || echo "Nothing to commit"
          git push
