name: OpenRouter Proxy

on:
  repository_dispatch:
    types: [ai-request]

jobs:
  proxy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Call OpenRouter API
        run: |
          RESPONSE=$(curl -s -X POST https://openrouter.ai/api/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.OPENROUTER_API_KEY }}" \
            -d '{
              "model": "openrouter/free",
              "messages": [{"role": "user", "content": "${{ github.event.client_payload.prompt }}"}]
            }')
          
          echo "$RESPONSE" | grep -o '"content":"[^"]*"' | head -1 | sed 's/"content":"//' | sed 's/"//' > response.txt
          
          cat response.txt
          
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add response.txt
          git diff --staged --quiet || git commit -m "Update response [skip ci]"
          git push
