name: OpenRouter Proxy

on:
  repository_dispatch:
    types: [ai-request]

jobs:
  proxy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Call OpenRouter API
        id: callapi
        run: |
          RESPONSE=$(curl -s -X POST https://openrouter.ai/api/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.OPENROUTER_API_KEY }}" \
            -d '{
              "model": "openrouter/free",
              "messages": [{"role": "user", "content": "${{ github.event.client_payload.prompt }}"}]
            }')
          
          echo "$RESPONSE" > full_response.json
          
          ANSWER=$(echo "$RESPONSE" | grep -o '"content":"[^"]*"' | head -1 | sed 's/"content":"//' | sed 's/"//' | sed 's/\\n/\n/g')
          
          if [ -z "$ANSWER" ]; then
            ANSWER="خطا: پاسخی از OpenRouter دریافت نشد"
          fi
          
          echo "$ANSWER" > response.txt
          
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add response.txt full_response.json
          git diff --staged --quiet || git commit -m "Update API response [skip ci]"
          git push
