name: OpenRouter Proxy

on:
  repository_dispatch:
    types: [ai-request]

jobs:
  proxy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Get AI Answer
        run: |
          # ارسال درخواست به OpenRouter
          RESPONSE=$(curl -s -X POST https://openrouter.ai/api/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.OPENROUTER_API_KEY }}" \
            -d '{
              "model": "openrouter/free",
              "messages": [{"role": "user", "content": "'"${{ github.event.client_payload.prompt }}"'"}]
            }')
          
          # ذخیره پاسخ کامل برای debug
          echo "$RESPONSE" > full.json
          
          # استخراج فقط متن پاسخ
          echo "$RESPONSE" | jq -r '.choices[0].message.content // "خطا: پاسخی دریافت نشد"' > output.txt
          
          # نمایش پاسخ در لاگ (برای اطمینان)
          echo "=== پاسخ دریافتی از OpenRouter ==="
          cat output.txt
          
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add output.txt full.json
          git commit -m "Update answer: $(date '+%Y-%m-%d %H:%M:%S')" || echo "Nothing to commit"
          git push
