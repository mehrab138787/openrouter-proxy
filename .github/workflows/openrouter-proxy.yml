name: OpenRouter Proxy

on:
  repository_dispatch:
    types: [ai-request]

jobs:
  proxy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Get AI Answer
        run: |
          curl -s -X POST https://openrouter.ai/api/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.OPENROUTER_API_KEY }}" \
            -d '{
              "model": "openrouter/free",
              "messages": [{"role": "user", "content": "'"${{ github.event.client_payload.prompt }}"'"}]
            }' > full.json
          
          cat full.json | jq -r '.choices[0].message.content' > output.txt
          
      - name: Save
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add output.txt full.json
          git commit -m "update answer" || echo "no change"
          git push
