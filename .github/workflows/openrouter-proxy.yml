name: OpenRouter Proxy

on:
  repository_dispatch:
    types: [ai-request]

jobs:
  proxy:
    runs-on: ubuntu-latest
    steps:
      - name: Call OpenRouter API
        run: |
          RESPONSE=$(curl -s -X POST https://openrouter.ai/api/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.OPENROUTER_API_KEY }}" \
            -d '{
              "model": "openrouter/free",
              "messages": [{"role": "user", "content": "${{ github.event.client_payload.prompt }}"}]
            }')
          
          ANSWER=$(echo "$RESPONSE" | grep -o '"content":"[^"]*"' | head -1 | sed 's/"content":"//' | sed 's/"//')
          
          if [ -z "$ANSWER" ]; then
            ANSWER="خطا در دریافت پاسخ از OpenRouter"
          fi
          
          echo "$ANSWER" > response.txt
          
      - name: Commit response
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add response.txt
          git commit -m "Update response" || echo "No changes"
          git push
