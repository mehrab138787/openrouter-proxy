name: OpenRouter Proxy

on:
  repository_dispatch:
    types: [ai-request]

jobs:
  proxy:
    runs-on: ubuntu-latest
    steps:
      - name: Call OpenRouter API
        id: call_openrouter
        run: |
          RESPONSE=$(curl -s -X POST https://openrouter.ai/api/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.OPENROUTER_API_KEY }}" \
            -d '{
              "model": "openrouter/free",
              "messages": [{"role": "user", "content": "${{ github.event.client_payload.prompt }}"}]
            }')
          
          echo "API Response: $RESPONSE"
          
          # استخراج متن پاسخ
          ANSWER=$(echo "$RESPONSE" | grep -o '"content":"[^"]*"' | head -1 | sed 's/"content":"//' | sed 's/"//')
          
          if [ -z "$ANSWER" ]; then
            ANSWER="خطا یا پاسخ نامعتبر از OpenRouter"
          fi
          
          echo "answer=$ANSWER" >> $GITHUB_OUTPUT
          
      - name: Show Answer in Summary
        run: |
          echo "## 🤖 پاسخ OpenRouter" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.call_openrouter.outputs.answer }}" >> $GITHUB_STEP_SUMMARY
